<html lang="en">
  <head>
    <title>form pendaftaran</title>
    <link rel="stylesheet" href="form.css"/>
  </head>
  <body>
    <div class="container">
      <h2>From pendaftaran jurusan</h2>
      
      <from>
        <div class="form-group">
          <label for="nama">Nama</label>
          <input id="nama" type="text" placeholder="Masukkan nama kamu"</div>
          
          <div class="from-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Masukkan email kamu"
          </div>
          
          <div class="from-group">
            <label for="asal_sekolah">Asal sekolah</label>
            <input id="asal_sekolah" type="asal_sekolah"  placeholder="Masukkan asal sekolah"/>
          </div>
          
          <div class="from-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Masukkan password"/>
          </div>
          
          <div class="from-group">
            <label>Gender</label>
            <div class="inline">
              <label><input type="radio" name="gender" /> Laki-Laki</label>
              <label><input type="radio" name="gender" /> Perempuan</label>
            </div>
          </div>
          
          <div class="from-group">
            <label>Jurusan</label>
            <div class="inline">
              <label><input type="checkbox" />Akl (Akutansi Keuangan Lembaga) </label>
              <label><input type="checkbox" />PM (Pemasaran) </label>
              <label><input type="checkbox" />MPLB (Manajemen perkantoran Layanan Bisnis)</label>
              <label><input type="checkbox" />BCF (b(Broadcasting dan Perfileman)</label>
              <label><input type="checkbox" />RPL (Rekayasa Perangkat Lunak)</label>
              <label><input type="checkbox" />TBS (Tata Busana)</label>
              <label><input type="checkbox" />DKV (Desain Komunikasi Visual)</label>
            </div>
          </div>
          
          <div class="from-group">
            <label for="kota">Kota</label>
            <select id="Kota">
              <option>Banjar</option>
              <option>Bandung</option>
              <option>Cilacap</option>
              <option>Jakarta</option>
              <option>Yogyakarta</option>
              <option>Tasik</option>
            </select>
            </div>
            <button type="subkmit">Daftar</button>
      </from>
  </body>
</html>
